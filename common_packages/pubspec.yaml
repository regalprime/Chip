name: common_packages
description: "Common packages"
version: 0.0.1
homepage:

environment:
  sdk: ^3.7.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI và tiện ích cơ bản
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  hugeicons: ^0.0.11

  # Quản lý trạng thái
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Lưu trữ và thông tin hệ thống
  shared_preferences: ^2.5.3
  package_info_plus: ^8.3.0

  # Firebase & Supabase
  firebase_core: ^3.15.1
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.2
  supabase_flutter: ^2.10.1

  # Dependency Injection & Routing
  get_it: ^8.2.0
  go_router: ^15.1.2

  # Định dạng quốc tế
  intl: ^0.19.0
  phosphor_flutter: ^2.1.0
  image_picker: ^1.2.1
  fl_chart: ^0.70.2

  # Document reader
  file_picker: ^8.3.7
  pdfrx: ^1.0.93
  docx_to_text: ^1.0.1
  path_provider: ^2.1.5
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/logo/
    - assets/font/

  fonts:
    - family: DancingScript
      fonts:
        - asset: assets/font/DancingScript-Regular.ttf
          weight: 400
        - asset: assets/font/DancingScript-Medium.ttf
          weight: 500
        - asset: assets/font/DancingScript-SemiBold.ttf
          weight: 600
        - asset: assets/font/DancingScript-Bold.ttf
          weight: 700
